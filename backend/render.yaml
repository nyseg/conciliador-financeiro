services:
  - type: web
    name: conciliador-financeiro-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-por && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
